# Application Properties
spring.application.name=bookshelf-backend
server.port=${SERVER_PORT:8088}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5455/bookshelf}
spring.datasource.username=${DB_USER:bookshelf_user}
spring.datasource.password=${DB_PASSWORD:bookshelf_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=${JWT_SECRET:bookshelf-super-secret-key-for-jwt-token-generation-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Jackson Configuration
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Logging — детальная конфигурация в logback-spring.xml
logging.level.root=INFO
logging.level.com.bookshelf=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# CORS allowed origins
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# File uploads
file.upload-dir=${UPLOAD_DIR:${user.dir}/uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# =====================================================================
# Recommendation engine
# =====================================================================
# Synthetic data generator (active only with @Profile("dev"))
recommendation.synthetic.enabled=${REC_SYNTH_ENABLED:false}
recommendation.synthetic.users=${REC_SYNTH_USERS:100}
recommendation.synthetic.interactions-mean=25
recommendation.synthetic.interactions-min=10
recommendation.synthetic.interactions-max=50
recommendation.synthetic.noise-ratio=0.08
recommendation.synthetic.seed=42

# Interaction weights (used for CF rating matrix)
recommendation.weights.review-multiplier=1.0
recommendation.weights.collection=4.5
recommendation.weights.order=4.0
recommendation.weights.view=1.0

# Item-kNN collaborative filtering
recommendation.cf.top-k-neighbors=50
recommendation.cf.min-common-users=2
recommendation.cf.refresh-cron=0 0 3 * * *

# Content-based (TF-IDF)
recommendation.cb.alpha-text=0.6
recommendation.cb.beta-genre=0.25
recommendation.cb.gamma-author=0.15
recommendation.cb.min-token-length=3
recommendation.cb.max-terms-per-book=80

# Hybrid blending thresholds: λ chosen by interaction count
recommendation.hybrid.cold-threshold=3
recommendation.hybrid.warm-threshold=10
recommendation.hybrid.lambda-cold=0.0
recommendation.hybrid.lambda-warm=0.3
recommendation.hybrid.lambda-hot=0.7

# Evaluation
recommendation.eval.train-ratio=0.8
recommendation.eval.top-k=10
