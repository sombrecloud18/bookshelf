# Application Properties
spring.application.name=bookshelf-backend
server.port=${SERVER_PORT:8088}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bookshelf}
spring.datasource.username=${DB_USER:bookshelf_user}
spring.datasource.password=${DB_PASSWORD:bookshelf_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=${JWT_SECRET:bookshelf-super-secret-key-for-jwt-token-generation-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Jackson Configuration
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Logging
logging.level.root=INFO
logging.level.com.bookshelf=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# CORS allowed origins
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Library BSUIR base URL
library.bsuir.url=${LIBRARY_URL:https://library.bsuir.by}
